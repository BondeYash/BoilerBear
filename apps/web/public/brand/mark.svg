<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="BoilerBear mark">
  <title>BoilerBear</title>
  <desc>Rounded terminal window forming a bear face with two ears, eyes, an amber prompt chevron, and a mint cursor block.</desc>

  <!-- Outer ears (cocoa) -->
  <circle cx="72" cy="44" r="30" fill="#2A1F1A" />
  <circle cx="184" cy="44" r="30" fill="#2A1F1A" />

  <!-- Inner ears (honey) -->
  <circle cx="72" cy="44" r="12" fill="#F5A524" />
  <circle cx="184" cy="44" r="12" fill="#F5A524" />

  <!-- Face / terminal window (cocoa, rounded square) -->
  <rect x="32" y="40" width="192" height="184" rx="44" ry="44" fill="#2A1F1A" />

  <!-- Subtle inner stroke for depth -->
  <rect x="32" y="40" width="192" height="184" rx="44" ry="44" fill="none" stroke="#3A2A22" stroke-width="2" />

  <!-- Eyes (cream) -->
  <circle cx="98" cy="118" r="9" fill="#FAF6EE" />
  <circle cx="158" cy="118" r="9" fill="#FAF6EE" />

  <!-- Prompt chevron `>` (honey) -->
  <path
    d="M104 162 L124 176 L104 190"
    fill="none"
    stroke="#F5A524"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Cursor block (mint) -->
  <rect x="138" y="170" width="22" height="14" rx="4" fill="#5EE2C5" />
</svg>
