name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test (core, with coverage)
        run: pnpm --filter @boilerbear/core test:coverage

      - name: Upload core coverage
        if: matrix.node == 20
        uses: actions/upload-artifact@v7
        with:
          name: core-coverage
          path: packages/core/coverage
          if-no-files-found: warn
          retention-days: 14

      - name: Build
        run: pnpm build

      - name: Validate manifests
        run: pnpm validate-manifests

  e2e:
    name: Playwright E2E (chromium)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @boilerbear/web exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          PORT: 3100
        run: pnpm --filter @boilerbear/web test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: warn
          retention-days: 14
